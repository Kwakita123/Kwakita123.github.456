<!DOCTYPE html>
<html>
<head>
    <title>Guess the Number</title>

    <style>
        body{
            font-family:Arial;
            text-align:center;
            background:#f4f4f4;
            margin-top:80px;
        }

        .box{
            background:white;
            width:350px;
            margin:auto;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        input{
            width:120px;
            padding:8px;
            font-size:18px;
        }

        button{
            padding:8px 15px;
            font-size:16px;
            cursor:pointer;
        }

        h1{
            color:#2c3e50;
        }

        p{
            font-size:20px;
            color:#0066cc;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="box">

<h1>🎲 Guess the Number</h1>

<p>I'm thinking of a number between <b>1</b> and <b>100</b>.</p>

<form method="POST">

    <input
        type="number"
        name="guess"
        min="1"
        max="100"
        required
    >

    <br><br>

    <button type="submit">Guess</button>

</form>

<p>{{ message }}</p>

</div>

</body>
</html>
